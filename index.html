<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>CTB Lead CRM</title>
<style>
  :root{color-scheme:light;--bg:#fff;--card:#fff;--line:#e6e8ee;--txt:#1c2230;
        --mut:#697086;--accent:#2563eb;--ok:#16a34a;--warn:#b7791f;--bad:#dc2626;--soft:#f6f7fb;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);padding:16px}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12.5px;margin-bottom:14px}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .kpi{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:100px;flex:1}
  .kpi .n{font-size:24px;font-weight:700}
  .kpi .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
  button{border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line)}
  .btn-primary{background:var(--accent);border:none;color:#fff}.btn-ghost{background:#fff;color:var(--txt)}
  button:disabled{opacity:.6;cursor:default}
  input,select{background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:14px}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--mut);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;background:var(--soft)}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
  .b-you{background:#fdecec;color:var(--bad)}.b-them{background:#fbf1dc;color:var(--warn)}.b-partner{background:#eef0f4;color:var(--mut)}
  .s-New{background:#e8effe;color:var(--accent)}.s-Replied{background:#e7f6ed;color:var(--ok)}
  .s-Awaiting{background:#fbf1dc;color:var(--warn)}.s-With{background:#eef0f4;color:var(--mut)}
  .s-Elsewhere{background:#efe8fe;color:#6d28d9}.s-Closed{background:#eef0f4;color:var(--mut)}
  .v-99co{background:#e8f0fe;color:#1a73e8}.v-ProjectSG{background:#fdeede;color:#c2410c}.v-{background:#eef0f4;color:var(--mut)}
  .due{color:var(--bad);font-weight:700}.kw{color:var(--mut);font-size:11px}.name{font-weight:600}
  .msg{color:var(--mut);max-width:300px}.foot{color:var(--mut);font-size:12px;margin-top:12px}
  .overdue-row td{background:#fff6f6}
  select.assign{padding:4px 6px;font-size:12px}
  .draftbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12.5px;color:#166534}
  a{color:var(--accent)}
  #app{display:none}
  /* lock screen */
  #lock{max-width:340px;margin:18vh auto 0;text-align:center}
  #lock h1{font-size:21px;margin-bottom:4px}
  #lock .sub{margin-bottom:20px}
  #pin{width:100%;font-size:20px;text-align:center;letter-spacing:.3em;padding:12px;margin-bottom:10px}
  #unlock{width:100%;padding:12px;font-size:15px}
  #lockerr{color:var(--bad);font-size:13px;min-height:18px;margin-top:10px}
  .remember{display:flex;gap:8px;justify-content:center;align-items:center;color:var(--mut);font-size:13px;margin-top:12px}
  /* phone layout: table becomes cards */
  @media (max-width:719px){
    body{padding:12px}
    table,tbody{display:block;border:none}
    thead{display:none}
    tr{display:block;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:12px;background:var(--card)}
    .overdue-row{background:#fff6f6}
    td{display:block;border:none;padding:2px 0;font-size:13px;background:none!important}
    td.rowhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
    td .name{font-size:15px}
    .pillrow{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
    .msg{max-width:none}
    .desktop-only{display:none!important}
  }
  @media (min-width:720px){ .mobile-only{display:none!important} }
</style></head>
<body>
  <div id="lock">
    <h1>CTB Lead CRM</h1>
    <div class="sub">Enter PIN to unlock</div>
    <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••">
    <button id="unlock" class="btn-primary">Unlock</button>
    <div class="remember"><input type="checkbox" id="remember" checked><label for="remember">Remember this device</label></div>
    <div id="lockerr"></div>
  </div>

  <div id="app">
  <h1>CTB WhatsApp Lead CRM</h1>
  <div class="sub" id="sub"></div>
  <div class="cards" id="kpis"></div>
  <div class="toolbar">
    <input id="search" placeholder="Search name, phone, project…" style="flex:1;min-width:160px">
    <select id="fball">
      <option value="">Ball with anyone</option>
      <option value="you">Your move</option>
      <option value="them">Waiting on them</option>
      <option value="partner">With partner</option>
    </select>
    <select id="fvendor"><option value="">All vendors</option></select>
    <select id="fstatus"><option value="">All statuses</option></select>
    <button id="lockbtn" class="btn-ghost">Lock</button>
  </div>
  <table id="tbl"><thead><tr>
    <th data-k="name">Lead</th><th data-k="project">Project</th><th data-k="vendor">Vendor</th>
    <th data-k="assign">Handled by</th><th data-k="status">Status</th>
    <th data-k="ball">Ball with</th><th data-k="waitDays">Waiting</th>
    <th data-k="lastAct">Last activity</th><th data-k="notes">Notes</th>
  </tr></thead><tbody id="rows"></tbody></table>
  <div class="foot" id="foot"></div>
  </div>

const PBKDF2_ITERS = 310000;
const b64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
const toB64 = u8 => btoa(String.fromCharCode(...u8));

async function deriveKey(pin, salt){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:PBKDF2_ITERS, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function tryDecrypt(key){
  const raw = b64(ENC), iv = raw.slice(16,28), ct = raw.slice(28);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlockWithPin(pin, remember){
  const raw = b64(ENC), salt = raw.slice(0,16);
  const key = await deriveKey(pin, salt);
  const data = await tryDecrypt(key); // throws on wrong PIN
  if(remember){
    const jwk = await crypto.subtle.exportKey('jwk', key);
    localStorage.setItem('ctb_key', JSON.stringify(jwk));
  }
  return data;
}
async function unlockWithSavedKey(){
  const jwkStr = localStorage.getItem('ctb_key');
  if(!jwkStr) return null;
  try{
    const key = await crypto.subtle.importKey('jwk', JSON.parse(jwkStr), {name:'AES-GCM'}, false, ['decrypt']);
    return await tryDecrypt(key);
  }catch(e){ localStorage.removeItem('ctb_key'); return null; }
}
function boot(data){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='block';
  initApp(data);
}
document.getElementById('unlock').onclick = async () => {
  const btn=document.getElementById('unlock'), err=document.getElementById('lockerr');
  btn.disabled=true; err.textContent='';
  try{
    const data = await unlockWithPin(document.getElementById('pin').value.trim(),
      document.getElementById('remember').checked);
    boot(data);
  }catch(e){ err.textContent='Wrong PIN.'; btn.disabled=false; }
};
document.getElementById('pin').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('unlock').click(); });
unlockWithSavedKey().then(d=>{ if(d) boot(d); });

function initApp(DATA){
document.getElementById('lockbtn').onclick=()=>{ localStorage.removeItem('ctb_key'); location.reload(); };
const DUE=(DATA.meta&&DATA.meta.replyDueDays)||2, COLD=(DATA.meta&&DATA.meta.coldDays)||14;
let now=new Date(); const dayMs=86400000;
const daysSince=iso=>{if(!iso)return null;const d=Math.floor((now-new Date(iso))/dayMs);return d<0?0:d;};
const fmt=iso=>{if(!iso)return"—";const d=new Date(iso);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});};
const vcls=v=>'v-'+(v||'').replace(/[^A-Za-z0-9]/g,'');
let ASSIGN={}; try{ASSIGN=JSON.parse(localStorage.getItem('ctb_assign')||'{}');}catch(e){}
const SYNC=DATA.sync||null;
function setSyncStatus(t){const f=document.getElementById('syncstat'); if(f) f.textContent=t;}
async function loadRemoteAssign(){
  if(!SYNC) return;
  try{
    const r=await fetch('https://raw.githubusercontent.com/'+SYNC.repo+'/main/assign.json?t='+Date.now(),{cache:'no-store'});
    if(r.ok){ASSIGN=await r.json(); localStorage.setItem('ctb_assign',JSON.stringify(ASSIGN)); render(); setSyncStatus('');}
  }catch(e){}
}
let pushTimer=null;
function pushAssignSoon(){ clearTimeout(pushTimer); setSyncStatus('Saving…'); pushTimer=setTimeout(pushAssign,800); }
async function pushAssign(){
  if(!SYNC||!SYNC.token){ setSyncStatus('Saved on this device only'); return; }
  try{
    const api='https://api.github.com/repos/'+SYNC.repo+'/contents/assign.json';
    const h={Authorization:'Bearer '+SYNC.token,Accept:'application/vnd.github+json'};
    let sha=null; const g=await fetch(api,{headers:h,cache:'no-store'}); if(g.ok) sha=(await g.json()).sha;
    const body={message:'Handled-by update',content:btoa(unescape(encodeURIComponent(JSON.stringify(ASSIGN)))),branch:'main'};
    if(sha) body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:h,body:JSON.stringify(body)});
    setSyncStatus(r.ok?'Assignments saved to all devices ✓':'Save failed — change it once more to retry');
  }catch(e){ setSyncStatus('Save failed (offline?) — will retry on next change'); }
}

function derive(l){
  const assignedTo = ASSIGN[l.id] || l.assignedTo || 'me';
  const leadReplied = !!l.lastLeadReplyAt;
  let status;
  if(l.status==='Replied elsewhere') status='Replied elsewhere';
  else if(l.status==='Closed') status='Closed';
  else if(assignedTo==='partner' && !leadReplied) status='With partner';
  else if(!l.contacted) status='New';
  else if(leadReplied) status='Replied';
  else status='Awaiting reply';
  let ball;
  if(assignedTo==='partner' && !leadReplied) ball='partner';
  else if(!l.contacted) ball='you';
  else if(leadReplied) ball = l.lastSpeaker==='me' ? 'them' : 'you';
  else ball='them';
  let waitDays, waitLabel, lastAct;
  if(leadReplied){waitDays=daysSince(l.lastLeadReplyAt);waitLabel='since they replied';lastAct='they replied '+fmt(l.lastLeadReplyAt);}
  else if(l.contacted){waitDays=daysSince(l.lastMyMessageAt);waitLabel='no reply yet';lastAct=(assignedTo==='partner'?'partner sent ':'you sent ')+fmt(l.lastMyMessageAt);}
  else {waitDays=daysSince(l.enquiryAt);waitLabel='not contacted';lastAct='enquiry '+fmt(l.enquiryAt);}
  const overdue = ball!=='partner' && waitDays!==null && waitDays>=DUE;
  return {...l,assignedTo,leadReplied,status,ball,waitDays,waitLabel,lastAct,overdue};
}
function rows(){return DATA.leads.map(derive);}
function paintKpis(R){
  const k={total:R.length,yourmove:R.filter(l=>l.ball==='you').length,
    overdue:R.filter(l=>l.overdue).length,partner:R.filter(l=>l.ball==='partner').length};
  document.getElementById('kpis').innerHTML=[['Total leads',k.total],['Your move',k.yourmove],
    ['Overdue ('+DUE+'d+)',k.overdue],['With partner',k.partner]]
    .map(([l,n])=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}
document.getElementById('sub').textContent='Reply status read from each lead’s own chat · vendors: '+
  ((DATA.meta.vendors||[]).join(', '))+' · last scan: '+(DATA.meta.lastScan?fmt(DATA.meta.lastScan):'never');
const vendors=[...new Set(DATA.leads.map(l=>l.vendor).filter(Boolean))];
document.getElementById('fvendor').insertAdjacentHTML('beforeend',vendors.map(v=>`<option>${v}</option>`).join(''));
const allStatuses=['New','Awaiting reply','Replied','With partner','Replied elsewhere','Closed'];
document.getElementById('fstatus').insertAdjacentHTML('beforeend',allStatuses.map(s=>`<option>${s}</option>`).join(''));
let sortK='waitDays',sortDir=-1;
const sc=s=>({'Awaiting reply':'Awaiting','With partner':'With','Replied elsewhere':'Elsewhere'}[s]||s);
const esc=s=>(''+(s??'')).replace(/&/g,'&amp;').replace(/</g,'&lt;');
function composeDraft(l){
  if(l.status==='Closed'||l.status==='Replied elsewhere'||l.ball==='partner') return '';
  const first=(l.name||'').split(' ')[0];
  if(!l.contacted) return 'Hi '+first+'! This is Benjamin from CTB Realty here \u{1F44B} I’ve just received your enquiry on '+l.project+' — thank you for your interest! I tried giving you a call but couldn’t reach you. I’ve got the '+(l.enquiryType||'details')+' ready — shall I send it over here? \u{1F60A}';
  if(!l.leadReplied) return 'Hi '+first+', Ben here \u{1F44B} Just circling back on '+l.project+' — happy to send over anything you need or answer any questions whenever convenient \u{1F60A}';
  return '';
}
const waLink=l=>{const n=(l.phone||'').replace(/[^0-9]/g,'');if(!n)return '';const d=l.draftReply||composeDraft(l);
  return 'https://wa.me/'+n+(d?'?text='+encodeURIComponent(d):'');};
const draftBox=l=>l.draftReply?`<div class="draftbox">📝 <b>Draft ready</b> — tap the number to open it in WhatsApp:<br>${esc(l.draftReply)}</div>`:'';
function render(){
  let R=rows();
  const q=document.getElementById('search').value.toLowerCase();
  const fv=document.getElementById('fvendor').value, fs=document.getElementById('fstatus').value, fb=document.getElementById('fball').value;
  R=R.filter(l=>{const hay=(l.name+' '+(l.phone||'')+' '+l.project+' '+(l.vendor||'')+' '+(l.notes||'')).toLowerCase();
    if(q&&!hay.includes(q))return false; if(fv&&l.vendor!==fv)return false; if(fs&&l.status!==fs)return false; if(fb&&l.ball!==fb)return false; return true;});
  R.sort((a,b)=>{let x=a[sortK],y=b[sortK]; if(x==null)x=-Infinity; if(y==null)y=-Infinity;
    return x<y?-sortDir:x>y?sortDir:(''+a.name).localeCompare(b.name);});
  paintKpis(rows());
  const mobile = window.matchMedia('(max-width:719px)').matches;
  document.getElementById('rows').innerHTML=R.map(l=>{
    const wait=`${l.waitDays==null?'—':l.waitDays+'d'}${l.overdue?' ⚠':''}`;
    const contact = l.phone
      ? `<a href="${waLink(l)}" target="_blank" rel="noopener" title="Opens WhatsApp with a draft ready to review">${esc(l.phone)}</a>`
      : (l.link?`<a href="${esc(l.link)}" target="_blank" rel="noopener">open link</a>`:'');
    if(mobile) return `<tr class="${l.overdue?'overdue-row':''}">
      <td class="rowhead"><span class="name">${esc(l.name)}</span><span class="${l.overdue?'due':'kw'}">${wait} <span class="kw">${l.waitLabel}</span></span></td>
      <td class="kw">${esc(l.project||'')}${l.enquiryType?' · '+esc(l.enquiryType):''}</td>
      <td>${contact?'<span class="kw">'+contact+'</span>':''}</td>
      <td class="pillrow"><span class="pill s-${sc(l.status)}">${l.status}</span>
        ${l.status==='With partner'&&l.ball==='partner'?'':`<span class="pill b-${l.ball}">${l.ball==='you'?'Your move':l.ball==='them'?'Waiting on them':'With partner'}</span>`}
        <span class="pill ${vcls(l.vendor)}">${esc(l.vendor||'—')}</span></td>
      <td class="kw">${l.lastAct} · <select class="assign" data-id="${esc(l.id)}">
          <option value="me"${l.assignedTo==='me'?' selected':''}>Me</option>
          <option value="partner"${l.assignedTo==='partner'?' selected':''}>Partner${l.partnerName?' ('+esc(l.partnerName)+')':''}</option>
        </select></td>
      ${l.notes?`<td class="msg">${esc(l.notes)}</td>`:''}
      ${l.draftReply?`<td>${draftBox(l)}</td>`:''}</tr>`;
    return `<tr class="${l.overdue?'overdue-row':''}">
    <td><div class="name">${esc(l.name)}</div><div class="kw">${contact}</div></td>
    <td>${esc(l.project||'')}<div class="kw">${esc(l.enquiryType||'')}</div></td>
    <td><span class="pill ${vcls(l.vendor)}">${esc(l.vendor||'—')}</span></td>
    <td><select class="assign" data-id="${esc(l.id)}">
        <option value="me"${l.assignedTo==='me'?' selected':''}>Me</option>
        <option value="partner"${l.assignedTo==='partner'?' selected':''}>Partner${l.partnerName?' ('+esc(l.partnerName)+')':''}</option>
      </select></td>
    <td><span class="pill s-${sc(l.status)}">${l.status}</span></td>
    <td><span class="pill b-${l.ball}">${l.ball==='you'?'You':l.ball==='them'?'Them':'Partner'}</span></td>
    <td class="${l.overdue?'due':''}">${wait}<div class="kw">${l.waitLabel}</div></td>
    <td class="kw">${l.lastAct}</td>
    <td class="msg">${esc(l.notes||'')}${draftBox(l)}</td></tr>`;}).join('')
    ||`<tr><td colspan="9" class="kw">No leads match.</td></tr>`;
  document.querySelectorAll('select.assign').forEach(s=>s.onchange=()=>{
    ASSIGN[s.dataset.id]=s.value; localStorage.setItem('ctb_assign',JSON.stringify(ASSIGN)); render(); pushAssignSoon();});
  document.getElementById('foot').innerHTML=R.length+' of '+DATA.leads.length+' leads · updated by the daily WhatsApp scan · <span id="syncstat"></span>';
}
document.querySelectorAll('th').forEach(th=>th.onclick=()=>{const c=th.dataset.k;
  if(['assign','lastAct','notes'].includes(c))return;
  if(c===sortK)sortDir*=-1;else{sortK=c;sortDir=-1;}render();});
['search','fvendor','fstatus','fball'].forEach(id=>document.getElementById(id).oninput=render);
let rz; window.addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(render,150);});
render();
loadRemoteAssign();
}
</script></body></html>
